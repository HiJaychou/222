{% extends "base.html" %}{% block content %}<div class="topbar"><div><h1>系统设置</h1><p>管理员密码、Web 面板端口、卸载相关设置。</p></div></div><div class="grid grid-2"><div class="card"><h2>修改管理员密码</h2><form class="form" method="post" action="/settings/password"><label>管理员账号</label><input name="username" value="admin" required><label>新密码</label><input name="password" type="password" required><button class="btn" type="submit">保存新密码</button></form></div><div class="card"><h2>Web 面板端口</h2><p>当前端口：<strong>{{ panel_port or '未知' }}/TCP</strong></p><button class="btn gray" disabled>修改端口（下一步接入）</button></div></div><div class="grid grid-2 mt"><div class="card"><h2>卸载 Web 面板</h2><p>只删除 Web 面板，保留 sing-box 和节点配置。</p><button class="btn red" disabled>卸载 Web 面板</button></div><div class="card"><h2>卸载所有服务</h2><p>删除 Web 面板、sing-box、所有协议配置和用户信息。此操作危险。</p><button class="btn red" disabled>卸载所有服务</button></div></div>{% endblock %}
